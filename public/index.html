<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OBS Music Widget</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="widget" class="widget widget--hidden" aria-live="polite">
      <div class="art-container">
        <img id="album-art" src="" alt="Album Art" />
      </div>
      <div class="track-info">
        <div class="track-title-wrapper">
          <span id="track-title" class="track-title"></span>
        </div>
        <div class="track-artist-wrapper">
          <span id="track-artist" class="track-artist"></span>
        </div>
      </div>
      <div class="visualizer paused" id="visualizer" aria-hidden="true">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
